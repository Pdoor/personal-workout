<!doctype html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<meta name="theme-color" content="#f4f0e8" media="(prefers-color-scheme: light)">
<meta name="theme-color" content="#0c100e" media="(prefers-color-scheme: dark)">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Workout">
<meta name="format-detection" content="telephone=no">
<link rel="manifest" href="manifest.webmanifest">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<link rel="apple-touch-icon" href="icon.svg">
<title>Personal Workout</title>
<style>
/* =========================================================
   DESIGN TOKENS — light (warm wellness) + dark (midnight sage)
   ========================================================= */
:root {
  --sand-50:#faf7f2; --sand-100:#f4ede0; --sand-200:#e8dcc7; --sand-300:#d2c1a3;
  --sand-400:#c4ad84; --sand-600:#8a7654; --sand-900:#2d2618;
  --sage-50:#ecf3ec; --sage-100:#d6e3d6; --sage-300:#9ab39e; --sage-400:#7a9a82;
  --sage-500:#607a68; --sage-600:#4f6c5a; --sage-700:#344f40; --sage-900:#1a2a23;
  --coral-100:#f5d4c9; --coral-300:#e89d8c; --coral-400:#d3796a; --coral-500:#c76c57;
  --coral-700:#6f3326; --blue-300:#8fb1c9; --blue-500:#4d7a9b; --gold:#d6a85e;

  --bg:#f4f0e8; --surface:#fffdf8; --surface-2:#f7f4ed; --surface-3:#efeae0;
  --ink:#14150f; --ink-2:#3a3d34; --muted:#5a6258; --line:#ddd5c7; --line-2:#c7bfae;
  --primary:var(--sage-700); --primary-2:var(--sage-500);
  --accent:var(--coral-500); --info:var(--blue-500);
  --shadow-1: 0 1px 0 rgba(255,255,255,0.6), 0 12px 28px rgba(45,39,30,0.08);
  --shadow-2: 0 22px 60px rgba(45,39,30,0.16);
  --shadow-glass: 0 18px 50px rgba(0,0,0,0.18);
  --grad-primary: linear-gradient(180deg, #486556, #344f40);
  --grad-rest: linear-gradient(180deg, #5379a0, #2f4961);
  --grad-coral: linear-gradient(180deg, #d3796a, #b3553f);

  --r-xs:8px; --r-sm:12px; --r-md:18px; --r-lg:24px; --r-xl:32px; --r-pill:999px;
  --s-1:4px; --s-2:8px; --s-3:12px; --s-4:16px; --s-5:20px; --s-6:24px; --s-7:32px; --s-8:48px;

  --ease: cubic-bezier(0.32, 0.72, 0, 1);
  --d-micro:120ms; --d-short:240ms; --d-enter:320ms; --d-large:460ms;

  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "Segoe UI", system-ui, sans-serif;
  color-scheme: light dark;
  -webkit-text-size-adjust: 100%;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg:#0c100e; --surface:#161b18; --surface-2:#1f2620; --surface-3:#262e27;
    --ink:#f0ece2; --ink-2:#c8c4b8; --muted:#8a9189; --line:#2c332e; --line-2:#3a423c;
    --shadow-1: 0 1px 0 rgba(255,255,255,0.04), 0 18px 40px rgba(0,0,0,0.45);
    --shadow-2: 0 24px 72px rgba(0,0,0,0.55);
    --shadow-glass: 0 18px 50px rgba(0,0,0,0.5);
    --grad-primary: linear-gradient(180deg, #486556, #2a4233);
  }
}

html[data-theme="dark"] {
  --bg:#0c100e; --surface:#161b18; --surface-2:#1f2620; --surface-3:#262e27;
  --ink:#f0ece2; --ink-2:#c8c4b8; --muted:#8a9189; --line:#2c332e; --line-2:#3a423c;
  --shadow-1: 0 1px 0 rgba(255,255,255,0.04), 0 18px 40px rgba(0,0,0,0.45);
  --shadow-2: 0 24px 72px rgba(0,0,0,0.55);
  --shadow-glass: 0 18px 50px rgba(0,0,0,0.5);
  --grad-primary: linear-gradient(180deg, #486556, #2a4233);
  color-scheme: dark;
}
html[data-theme="light"] {
  --bg:#f4f0e8; --surface:#fffdf8; --surface-2:#f7f4ed; --surface-3:#efeae0;
  --ink:#14150f; --ink-2:#3a3d34; --muted:#5a6258; --line:#ddd5c7; --line-2:#c7bfae;
  --shadow-1: 0 1px 0 rgba(255,255,255,0.6), 0 12px 28px rgba(45,39,30,0.08);
  --shadow-2: 0 22px 60px rgba(45,39,30,0.16);
  --shadow-glass: 0 18px 50px rgba(0,0,0,0.18);
  --grad-primary: linear-gradient(180deg, #486556, #344f40);
  color-scheme: light;
}

* { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
*:focus-visible { outline: 3px solid color-mix(in srgb, var(--accent) 60%, transparent); outline-offset: 2px; border-radius: var(--r-xs); }

html, body { margin: 0; background: var(--bg); }
html {
  background:
    radial-gradient(800px 400px at 100% -10%, color-mix(in srgb, var(--sage-300) 14%, transparent), transparent 60%),
    radial-gradient(700px 380px at -10% 8%, color-mix(in srgb, var(--coral-300) 8%, transparent), transparent 70%),
    var(--bg);
  background-attachment: fixed;
  min-height: 100vh;
}
body {
  color: var(--ink);
  font-size: 16px; line-height: 1.45; letter-spacing: -0.005em;
  min-height: 100vh;
  overscroll-behavior-y: contain;
  -webkit-font-smoothing: antialiased;
}
button { font: inherit; color: inherit; background: none; border: 0; cursor: pointer; padding: 0; }
img, video { max-width: 100%; display: block; }
a { color: var(--primary); text-decoration: none; }

@media (prefers-reduced-motion: reduce) {
  * { transition-duration: 0.01ms !important; animation-duration: 0.01ms !important; scroll-behavior: auto !important; }
}
@media (prefers-reduced-transparency: reduce) {
  .glass, .blur, .glass-btn, .crumb, .coach-hud, .pat-opt, .ring-host .glassbg, .controls-dock .c, .stage-info, .next-mini, .scrub, .toast {
    backdrop-filter: none !important; -webkit-backdrop-filter: none !important;
  }
}
@media (prefers-contrast: more) {
  :root { --line: var(--ink-2); --muted: var(--ink); }
}

/* APP SHELL */
.app {
  width: min(100%, 560px);
  margin: 0 auto;
  padding-top: env(safe-area-inset-top);
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
  padding-bottom: calc(76px + env(safe-area-inset-bottom));
  min-height: 100vh;
  position: relative;
}
.view { display: none; padding: 12px 16px 20px; }
.view.is-active { display: block; }

.viewhead {
  display: flex; align-items: center; justify-content: space-between;
  gap: var(--s-3); padding: 12px 0 4px;
  position: sticky; top: env(safe-area-inset-top); z-index: 5;
  background: linear-gradient(180deg, var(--bg) 70%, transparent);
}
.viewhead h1 { margin: 0; font-size: 28px; font-weight: 800; letter-spacing: -0.025em; line-height: 1.05; }
.viewhead .sub { display: block; margin-top: 2px; color: var(--muted); font-size: 13px; font-weight: 600; }

.icon-btn {
  width: 40px; height: 40px;
  display: grid; place-items: center;
  border-radius: var(--r-pill);
  background: var(--surface);
  border: 1px solid var(--line);
  color: var(--ink);
  box-shadow: var(--shadow-1);
}
.icon-btn:active { transform: scale(0.96); }
.icon-btn svg { width: 18px; height: 18px; }

/* TAB BAR */
.tabbar {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 30;
  display: grid; grid-template-columns: repeat(4, 1fr);
  padding: 8px 12px calc(8px + env(safe-area-inset-bottom));
  background: color-mix(in srgb, var(--surface) 78%, transparent);
  backdrop-filter: saturate(180%) blur(22px);
  -webkit-backdrop-filter: saturate(180%) blur(22px);
  border-top: 1px solid var(--line);
}
.tabbar.hidden { display: none; }
.tab {
  display: grid; place-items: center; gap: 2px;
  padding: 6px 4px; color: var(--muted);
  font-size: 10px; font-weight: 700; letter-spacing: 0.02em;
  min-height: 50px; border-radius: var(--r-md);
}
.tab svg { width: 24px; height: 24px; stroke-width: 2.2; }
.tab[aria-current="true"] { color: var(--primary); }
.tab[aria-current="true"] svg { stroke-width: 2.6; }
.tab:active { transform: scale(0.95); }

.card { background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg); padding: var(--s-4); box-shadow: var(--shadow-1); }
.list { display: grid; gap: 10px; }

.kicker { color: var(--primary-2); font-size: 11px; font-weight: 800; letter-spacing: 0.16em; text-transform: uppercase; margin-bottom: 4px; }
.h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.025em; line-height: 1.05; margin: 0; }
.h2 { font-size: 22px; font-weight: 700; letter-spacing: -0.015em; line-height: 1.15; margin: 0; }
.h3 { font-size: 17px; font-weight: 700; letter-spacing: -0.01em; line-height: 1.2; margin: 0; }
.body { font-size: 15px; line-height: 1.45; color: var(--ink-2); margin: 0; }
.muted { color: var(--muted); }
.tabular { font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }

/* SEG / BTN / CHIP */
.seg {
  display: grid; grid-auto-flow: column; grid-auto-columns: 1fr;
  padding: 4px;
  background: var(--surface-3); border: 1px solid var(--line); border-radius: var(--r-md);
}
.seg button {
  min-height: 38px; padding: 0 10px;
  font-size: 13px; font-weight: 700; color: var(--muted);
  border-radius: calc(var(--r-md) - 6px);
}
.seg button[aria-pressed="true"] { background: var(--surface); color: var(--primary); box-shadow: var(--shadow-1); }
.seg.compact button { min-height: 30px; font-size: 12px; }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 8px;
  min-height: 48px; padding: 0 18px;
  border-radius: var(--r-md);
  font-weight: 700; font-size: 15px;
  background: var(--surface-3); color: var(--ink);
  transition: transform var(--d-micro) var(--ease);
}
.btn svg { width: 18px; height: 18px; }
.btn.primary { background: var(--grad-primary); color: #fff; box-shadow: 0 14px 30px rgba(52,79,64,0.35); }
.btn.coral { background: var(--grad-coral); color: #fff; }
.btn.ghost { background: var(--surface); border: 1px solid var(--line); }
.btn.full { width: 100%; }
.btn:active { transform: scale(0.97); }

.chip {
  display: inline-flex; align-items: center; gap: 6px;
  padding: 6px 12px; border-radius: var(--r-pill);
  background: var(--surface); border: 1px solid var(--line);
  color: var(--ink);
  font-size: 12.5px; font-weight: 600;
}
.chip.sage { background: color-mix(in srgb, var(--sage-300) 18%, transparent); border-color: color-mix(in srgb, var(--sage-300) 28%, transparent); color: var(--primary); }
.chip.coral { background: color-mix(in srgb, var(--coral-300) 18%, transparent); border-color: color-mix(in srgb, var(--coral-300) 28%, transparent); color: var(--coral-500); }
.chip.blue { background: color-mix(in srgb, var(--blue-300) 18%, transparent); border-color: color-mix(in srgb, var(--blue-300) 28%, transparent); color: var(--info); }

/* TODAY */
.streak-rings {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 14px;
}
.sring {
  display: flex; flex-direction: column; align-items: center;
  padding: 14px 8px 12px;
  background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg);
  box-shadow: var(--shadow-1);
}
.sring .ring { position: relative; width: 70px; height: 70px; }
.sring .ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
.sring .ring .num {
  position: absolute; inset: 0; display: grid; place-items: center;
  font-size: 18px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -0.02em;
  color: var(--ink);
}
.sring b { margin-top: 6px; font-size: 12.5px; font-weight: 700; }
.sring span { color: var(--muted); font-size: 11px; }

.suggest-card {
  margin-top: 18px; padding: 18px; border-radius: var(--r-lg);
  background:
    radial-gradient(400px 200px at 100% 0%, color-mix(in srgb, var(--sage-300) 18%, transparent), transparent 60%),
    var(--surface);
  border: 1px solid var(--line); box-shadow: var(--shadow-1);
}
.suggest-card .lab { color: var(--primary-2); font-size: 11px; font-weight: 800; letter-spacing: 0.16em; text-transform: uppercase; }
.suggest-card h2 { margin: 4px 0 6px; font-size: 22px; font-weight: 800; letter-spacing: -0.02em; }
.suggest-card p { margin: 0 0 14px; color: var(--muted); font-size: 13.5px; line-height: 1.4; }
.suggest-card .row { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }

.section-title {
  display: flex; align-items: end; justify-content: space-between;
  gap: 10px; margin: 22px 0 10px;
}
.section-title h2 { margin: 0; font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }
.section-title a { font-size: 13px; font-weight: 600; color: var(--primary-2); }

.history { display: grid; gap: 8px; }
.history .item {
  display: grid; grid-template-columns: 38px 1fr auto;
  gap: 12px; align-items: center;
  padding: 12px 14px;
  background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-md);
}
.history .item .ic {
  width: 38px; height: 38px; display: grid; place-items: center;
  border-radius: var(--r-sm);
  background: var(--grad-primary); color: #fff;
}
.history .item .ic svg { width: 18px; height: 18px; }
.history .item b { display: block; font-size: 13.5px; font-weight: 700; }
.history .item span { display: block; color: var(--muted); font-size: 11.5px; margin-top: 1px; }
.history .item time { color: var(--muted); font-size: 11.5px; }

.empty {
  padding: 16px; text-align: center;
  color: var(--muted); font-size: 13px;
  border: 1px dashed var(--line-2); border-radius: var(--r-md);
}

/* TRAIN */
.train-tabs { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 12px; }
.cat-tab {
  position: relative; padding: 8px 10px;
  border-radius: var(--r-md);
  background: var(--surface); border: 1px solid var(--line);
  text-align: left; box-shadow: var(--shadow-1);
  min-height: 48px;
}
.cat-tab strong { display: block; font-size: 14px; font-weight: 800; line-height: 1.1; }
.cat-tab span { display: block; color: var(--muted); font-size: 10px; margin-top: 1px; line-height: 1.15; }
.cat-tab[aria-pressed="true"] { background: var(--grad-primary); color: #fff; border-color: transparent; }
.cat-tab[aria-pressed="true"] span { color: rgba(255,255,255,0.85); }

.preview-card {
  margin-top: 14px; padding: 18px;
  border-radius: var(--r-lg);
  background: var(--surface); border: 1px solid var(--line);
  box-shadow: var(--shadow-1);
}
.preview-card .head { display: flex; align-items: end; justify-content: space-between; gap: 12px; }
.preview-card .head h2 { margin: 0; font-size: 22px; font-weight: 800; letter-spacing: -0.02em; }
.preview-card .head .pill {
  font-size: 11px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 5px 10px; border-radius: var(--r-pill);
  background: color-mix(in srgb, var(--sage-300) 18%, transparent);
  color: var(--primary);
}

.metrics { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-top: 14px; }
.metric {
  background: var(--surface-2); border: 1px solid var(--line);
  border-radius: var(--r-md); padding: 10px 12px;
}
.metric b { display: block; font-size: 18px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
.metric span { display: block; color: var(--muted); font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; margin-top: 2px; }

.preview-list { margin-top: 14px; display: grid; gap: 8px; }
.ex-row {
  display: grid; grid-template-columns: 56px 1fr auto;
  gap: 12px; align-items: center;
  padding: 8px;
  background: var(--surface-2); border-radius: var(--r-md); border: 1px solid var(--line);
}
.ex-row .thumb {
  width: 56px; height: 56px;
  border-radius: var(--r-sm); overflow: hidden;
  background: linear-gradient(135deg, var(--sage-100), var(--sand-100));
  display: grid; place-items: center;
}
.ex-row .thumb img { width: 100%; height: 100%; object-fit: cover; }
.ex-row .thumb svg { width: 38px; height: 38px; color: var(--primary); }
.ex-row b { display: block; font-size: 13.5px; font-weight: 700; }
.ex-row span { display: block; color: var(--muted); font-size: 11.5px; margin-top: 2px; line-height: 1.25; }
.ex-row .num {
  width: 36px; height: 36px; display: grid; place-items: center;
  border-radius: var(--r-pill);
  background: var(--surface); border: 1px solid var(--line);
  font-size: 13px; font-weight: 800; color: var(--primary);
}

.cta-stack { margin-top: 18px; display: grid; gap: 10px; }

/* NOW TRAINING */
.now {
  position: fixed; inset: 0; z-index: 50;
  background: var(--bg);
  display: none; overflow: hidden; color: var(--ink);
}
.now.is-active { display: block; }

.now .topbar {
  position: absolute; top: env(safe-area-inset-top);
  left: 0; right: 0; z-index: 6;
  display: flex; justify-content: space-between; align-items: center;
  padding: 14px 16px;
}

.glass-btn {
  width: 36px; height: 36px;
  display: grid; place-items: center;
  border-radius: var(--r-pill);
  background: color-mix(in srgb, #000 30%, transparent);
  border: 1px solid color-mix(in srgb, #fff 12%, transparent);
  backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px);
  color: #fff;
}
.glass-btn svg { width: 16px; height: 16px; }
.glass-btn:active { transform: scale(0.94); }

.now .crumb {
  font-size: 13px; font-weight: 700; color: #fff;
  padding: 8px 14px; border-radius: var(--r-pill);
  background: color-mix(in srgb, #000 30%, transparent);
  backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px);
  border: 1px solid color-mix(in srgb, #fff 12%, transparent);
}

.now[data-pattern="cinematic"] .stage { position: absolute; inset: 0; }
.stage video, .stage img.pic {
  position: absolute; inset: 0;
  width: 100%; height: 100%;
  object-fit: cover; background: #000;
}
.stage .dim {
  position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0) 24%, rgba(0,0,0,0) 56%, rgba(0,0,0,0.85) 100%);
}
.now[data-phase="rest"] .stage .dim {
  background: linear-gradient(180deg, rgba(31,73,97,0.6) 0%, rgba(15,28,40,0.4) 35%, rgba(15,28,40,0.85) 100%);
}

.now[data-pattern="cinematic"] .ring-host {
  position: absolute;
  top: calc(env(safe-area-inset-top) + 80px);
  left: 50%; transform: translateX(-50%);
  width: 200px; height: 200px;
  display: grid; place-items: center;
}
.ring-host .glassbg {
  position: absolute; inset: 0;
  border-radius: 50%;
  background: color-mix(in srgb, #000 42%, transparent);
  border: 1px solid color-mix(in srgb, #fff 6%, transparent);
  backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
  box-shadow: 0 18px 50px rgba(0,0,0,0.5);
}
.ring-host svg.ring { position: absolute; inset: 8px; transform: rotate(-90deg); }
.ring-host .ringnum { position: relative; z-index: 2; text-align: center; color: #fff; }
.ring-host .ringnum .t { font-size: 52px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -0.04em; line-height: 1; }
.ring-host .ringnum .l { display: block; margin-top: 4px; font-size: 10px; color: var(--sage-300); letter-spacing: 0.2em; text-transform: uppercase; font-weight: 800; }
.now[data-phase="rest"] .ring-host .ringnum .l { color: var(--blue-300); }

.now[data-pattern="cinematic"] .stage-info {
  position: absolute;
  left: 16px; right: 16px;
  bottom: calc(118px + env(safe-area-inset-bottom));
  padding: 14px 16px;
  border-radius: var(--r-md);
  background: color-mix(in srgb, #000 50%, transparent);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid color-mix(in srgb, #fff 6%, transparent);
  color: #fff;
}
.stage-info b { display: block; font-size: 18px; font-weight: 700; letter-spacing: -0.01em; }
.stage-info span { display: block; margin-top: 4px; font-size: 13px; line-height: 1.35; color: rgba(255,255,255,0.82); }

.now .controls-dock {
  position: absolute;
  left: 16px; right: 16px;
  bottom: calc(20px + env(safe-area-inset-bottom));
  display: grid; grid-template-columns: 56px 1fr 56px;
  gap: 10px; z-index: 6;
}
.now .controls-dock .c {
  height: 56px; border-radius: var(--r-pill);
  background: color-mix(in srgb, #000 50%, transparent);
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  border: 1px solid color-mix(in srgb, #fff 8%, transparent);
  color: #fff;
  display: grid; place-items: center;
}
.now .controls-dock .c svg { width: 22px; height: 22px; stroke-width: 2.4; }
.now .controls-dock .c.primary {
  background: var(--grad-primary); border-color: transparent;
  display: inline-flex; gap: 10px;
  font-weight: 800; font-size: 15px;
  box-shadow: 0 14px 30px rgba(52,79,64,0.55);
}
.now .controls-dock .c:active { transform: scale(0.96); }

.now .next-strip {
  position: absolute;
  left: 16px; right: 16px;
  bottom: calc(220px + env(safe-area-inset-bottom));
  z-index: 5;
}
.now .next-strip .lab {
  color: rgba(255,255,255,0.7);
  font-size: 10px; font-weight: 800; letter-spacing: 0.16em; text-transform: uppercase;
  margin-bottom: 6px; padding-left: 4px;
}
.now .next-strip .row {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
}
.next-mini {
  border-radius: 14px;
  background: color-mix(in srgb, #000 42%, transparent);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid color-mix(in srgb, #fff 6%, transparent);
  color: #fff; text-align: center;
  padding: 6px 6px 8px; position: relative; overflow: hidden;
}
.next-mini .pic {
  width: 100%; aspect-ratio: 16/9;
  border-radius: 8px; overflow: hidden;
  background: linear-gradient(135deg, var(--sage-700), var(--sage-500));
  margin-bottom: 4px;
}
.next-mini .pic img, .next-mini .pic video { width: 100%; height: 100%; object-fit: cover; }
.next-mini b { display: block; font-size: 11px; font-weight: 700; line-height: 1.15; }
.next-mini span { display: block; font-size: 9.5px; opacity: 0.7; margin-top: 1px; }

/* PATTERN B — floating */
.now[data-pattern="floating"] .stage { display: none; }
.now[data-pattern="floating"] {
  background:
    radial-gradient(500px 280px at 50% -10%, color-mix(in srgb, var(--sage-300) 14%, transparent), transparent 60%),
    var(--bg);
  color: var(--ink);
}
.now[data-pattern="floating"] .ring-host {
  position: absolute;
  top: calc(env(safe-area-inset-top) + 72px);
  left: 50%; transform: translateX(-50%);
  width: 220px; height: 220px;
  display: grid; place-items: center;
}
.now[data-pattern="floating"] .ring-host .glassbg {
  background: var(--surface); border: 1px solid var(--line);
  backdrop-filter: none; -webkit-backdrop-filter: none;
  box-shadow: var(--shadow-1);
}
.now[data-pattern="floating"] .ring-host .ringnum,
.now[data-pattern="floating"] .ring-host .ringnum .t { color: var(--ink); }
.now[data-pattern="floating"] .ring-host .ringnum .l { color: var(--primary-2); }
.now[data-pattern="floating"] .stage-info,
.now[data-pattern="floating"] .next-strip,
.now[data-pattern="floating"] .coach-hud { display: none; }

.now[data-pattern="floating"] .floating-name {
  display: block;
  position: absolute;
  top: calc(env(safe-area-inset-top) + 312px);
  left: 16px; right: 16px;
  text-align: center;
}
.now:not([data-pattern="floating"]) .floating-name { display: none; }
.floating-name h2 { margin: 0; font-size: 22px; font-weight: 800; letter-spacing: -0.02em; color: var(--ink); }
.floating-name p { margin: 4px 16px 0; color: var(--muted); font-size: 13px; line-height: 1.35; }

.now[data-pattern="floating"] .controls-dock .c {
  background: var(--surface); border: 1px solid var(--line); color: var(--ink);
  backdrop-filter: none; -webkit-backdrop-filter: none;
}
.now[data-pattern="floating"] .controls-dock .c.primary {
  background: var(--grad-primary); color: #fff; border-color: transparent;
}

.pip-floater {
  position: absolute;
  bottom: calc(108px + env(safe-area-inset-bottom));
  right: 14px;
  width: 144px; height: 256px;
  border-radius: 18px; overflow: hidden;
  background: #000;
  border: 1px solid color-mix(in srgb, #fff 14%, transparent);
  box-shadow: var(--shadow-glass);
  z-index: 6;
  touch-action: none;
}
.pip-floater video, .pip-floater img { width: 100%; height: 100%; object-fit: cover; }
.pip-floater::after {
  content: ""; position: absolute; inset: 0;
  background: linear-gradient(180deg, rgba(0,0,0,0) 60%, rgba(0,0,0,0.45));
  pointer-events: none;
}
.pip-grip {
  position: absolute; top: 8px; right: 8px;
  width: 26px; height: 26px; display: grid; place-items: center;
  background: rgba(0,0,0,0.45); border-radius: var(--r-pill);
  color: #fff; font-size: 10px;
}

/* PATTERN C — Coach Mode */
.now[data-pattern="coach"] .stage video,
.now[data-pattern="coach"] .stage img.pic { object-fit: contain; background: #000; }
.now[data-pattern="coach"] .stage .dim {
  background: linear-gradient(180deg, rgba(0,0,0,0.5) 0%, transparent 16%, transparent 80%, rgba(0,0,0,0.6) 100%);
}
.now[data-pattern="coach"] .ring-host,
.now[data-pattern="coach"] .stage-info,
.now[data-pattern="coach"] .next-strip,
.now[data-pattern="coach"] .floating-name { display: none; }
.coach-hud {
  position: absolute;
  top: calc(env(safe-area-inset-top) + 14px);
  left: 16px; right: 16px;
  display: none;
  align-items: center; gap: 8px;
  padding: 10px 14px; border-radius: var(--r-pill);
  background: color-mix(in srgb, #000 55%, transparent);
  backdrop-filter: blur(22px); -webkit-backdrop-filter: blur(22px);
  border: 1px solid color-mix(in srgb, #fff 10%, transparent);
  color: #fff; font-size: 12.5px; z-index: 6;
}
.now[data-pattern="coach"] .coach-hud { display: flex; }
.coach-hud .t { font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; font-size: 14px; }
.coach-hud .name { flex: 1; opacity: 0.95; font-weight: 700; }
.coach-hud .next { opacity: 0.7; font-size: 11.5px; }
.coach-hud .x { width: 24px; height: 24px; display: grid; place-items: center; border-radius: 999px; background: rgba(255,255,255,0.12); }
.coach-hud .x svg { width: 12px; height: 12px; }

/* PATTERN MINIMAL */
.now[data-pattern="minimal"] {
  background: var(--bg); color: var(--ink);
}
.now[data-pattern="minimal"] .stage,
.now[data-pattern="minimal"] .ring-host,
.now[data-pattern="minimal"] .stage-info,
.now[data-pattern="minimal"] .next-strip,
.now[data-pattern="minimal"] .floating-name,
.now[data-pattern="minimal"] .coach-hud { display: none; }
.now[data-pattern="minimal"] .controls-dock .c {
  background: var(--surface); border: 1px solid var(--line); color: var(--ink);
  backdrop-filter: none; -webkit-backdrop-filter: none;
}
.now[data-pattern="minimal"] .controls-dock .c.primary {
  background: var(--grad-primary); color: #fff; border-color: transparent;
}
.now-min {
  display: none;
  padding: calc(env(safe-area-inset-top) + 80px) 16px 200px;
}
.now[data-pattern="minimal"] .now-min { display: block; }
.now-min .timer-big {
  font-size: 96px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -0.05em; line-height: 1;
  text-align: center; margin-bottom: 8px;
}
.now-min .lab { text-align: center; color: var(--primary-2); font-size: 11px; font-weight: 800; letter-spacing: 0.2em; text-transform: uppercase; }
.now-min .name { text-align: center; margin: 18px 0 4px; font-size: 22px; font-weight: 800; letter-spacing: -0.02em; }
.now-min .cue { text-align: center; color: var(--muted); font-size: 14px; margin: 0 16px; line-height: 1.4; }
.now-min .video {
  margin: 18px auto 0;
  width: 100%; max-width: 360px; aspect-ratio: 16/9;
  border-radius: var(--r-lg); overflow: hidden;
  background: #000;
  border: 1px solid var(--line);
  box-shadow: var(--shadow-1);
}
.now-min .video video, .now-min .video img { width: 100%; height: 100%; object-fit: cover; }

/* REST PREVIEW */
.rest-preview {
  position: absolute;
  left: 16px; right: 16px;
  top: calc(env(safe-area-inset-top) + 320px);
  display: none;
  z-index: 5;
}
.now[data-phase="rest"][data-next-preview="on"][data-pattern="cinematic"] .rest-preview { display: block; }
.rest-preview .lab {
  color: var(--blue-300);
  font-size: 10px; font-weight: 800; letter-spacing: 0.2em; text-transform: uppercase;
  text-align: center; margin-bottom: 8px;
}
.rest-preview .card-rp {
  margin: 0 auto;
  width: 80%; max-width: 280px; aspect-ratio: 16/9;
  border-radius: var(--r-md); overflow: hidden;
  background: #000; position: relative;
  border: 1px solid color-mix(in srgb, var(--blue-300) 30%, transparent);
  box-shadow: var(--shadow-glass);
}
.rest-preview .card-rp video, .rest-preview .card-rp img { width: 100%; height: 100%; object-fit: cover; }
.rest-preview .card-rp::after {
  content: attr(data-name);
  position: absolute; left: 0; right: 0; bottom: 0;
  padding: 6px 10px;
  background: linear-gradient(180deg, transparent, rgba(0,0,0,0.7));
  color: #fff;
  font-size: 11.5px; font-weight: 700;
}

/* PROGRESS LINE */
.progress-line {
  position: absolute;
  left: 16px; right: 16px;
  bottom: calc(102px + env(safe-area-inset-bottom));
  height: 3px; border-radius: 2px;
  background: color-mix(in srgb, #fff 14%, transparent);
  overflow: hidden; z-index: 5;
}
.now[data-pattern="floating"] .progress-line,
.now[data-pattern="minimal"] .progress-line { background: var(--surface-3); }
.progress-line i {
  display: block; height: 100%;
  background: linear-gradient(90deg, var(--sage-300), var(--coral-300));
  border-radius: 2px;
  transition: width 0.2s linear;
}
.now[data-phase="rest"] .progress-line i {
  background: linear-gradient(90deg, var(--blue-300), #fff);
}

/* END SCREEN */
.end {
  position: fixed; inset: 0; z-index: 60;
  display: none;
  background:
    radial-gradient(420px 240px at 50% 0%, color-mix(in srgb, var(--sage-300) 22%, transparent), transparent 60%),
    var(--bg);
  flex-direction: column; align-items: center; text-align: center;
  padding: max(60px, calc(40px + env(safe-area-inset-top))) 16px max(40px, env(safe-area-inset-bottom));
  overflow-y: auto;
}
.end.is-active { display: flex; }
.end .badge {
  width: 72px; height: 72px; border-radius: 50%;
  background: var(--grad-primary);
  display: grid; place-items: center;
  box-shadow: 0 18px 36px rgba(52,79,64,0.5);
  color: #fff;
}
.end .badge svg { width: 36px; height: 36px; stroke-width: 3; }
.end h1 { margin: 18px 0 4px; font-size: 40px; font-weight: 800; letter-spacing: -0.025em; }
.end p { color: var(--muted); margin: 0; }
.end .kpi-row {
  margin-top: 24px;
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px;
  width: 100%; max-width: 360px;
}
.end .kpi {
  background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-md);
  padding: 12px;
}
.end .kpi b { display: block; font-size: 22px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; }
.end .kpi span { display: block; color: var(--muted); font-size: 10px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.1em; margin-top: 2px; }
.end .actions { margin-top: 22px; display: grid; gap: 10px; width: 100%; max-width: 360px; }

/* LIBRARY */
.lib-filters { display: flex; gap: 8px; margin-top: 12px; flex-wrap: wrap; }
.lib-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 14px; }
.lib-card {
  background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-md);
  overflow: hidden; text-align: left;
  box-shadow: var(--shadow-1);
}
.lib-card .cover {
  width: 100%; aspect-ratio: 16/10;
  background: linear-gradient(135deg, var(--sage-100), var(--sand-100));
  position: relative;
}
.lib-card .cover img, .lib-card .cover video { width: 100%; height: 100%; object-fit: cover; }
.lib-card .cover svg { width: 50px; height: 50px; color: var(--primary); margin: 14px auto; display: block; }
.lib-card .meta { padding: 10px 12px 12px; }
.lib-card b { display: block; font-size: 13.5px; font-weight: 700; letter-spacing: -0.005em; line-height: 1.2; }
.lib-card span { display: block; color: var(--muted); font-size: 11px; margin-top: 3px; }
.lib-card .badge-cat {
  position: absolute; top: 8px; left: 8px;
  font-size: 10px; font-weight: 800; padding: 4px 8px; border-radius: var(--r-pill);
  background: color-mix(in srgb, #000 45%, transparent);
  backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
  color: #fff;
  letter-spacing: 0.08em; text-transform: uppercase;
}

/* LIBRARY DETAIL */
.lib-studio {
  position: relative;
  border-radius: var(--r-lg); overflow: hidden;
  background: #000; aspect-ratio: 16/10;
  box-shadow: var(--shadow-2);
  margin-top: 6px;
}
.lib-studio video, .lib-studio img { width: 100%; height: 100%; object-fit: cover; display: block; }
.lib-studio .scrub {
  position: absolute;
  left: 12px; right: 12px; bottom: 12px;
  padding: 10px 12px; border-radius: 14px;
  background: color-mix(in srgb, #000 55%, transparent);
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid color-mix(in srgb, #fff 8%, transparent);
  color: #fff; font-size: 11px;
}
.lib-studio .scrub .row1 { display: flex; justify-content: space-between; font-weight: 700; }
.lib-studio .scrub .bar {
  position: relative; height: 4px; background: rgba(255,255,255,0.2); border-radius: 2px;
  margin: 6px 0;
}
.lib-studio .scrub .bar i {
  display: block; height: 100%; width: 35%;
  background: linear-gradient(90deg, var(--sage-300), #fff);
  border-radius: 2px;
}
.lib-studio .scrub .speeds { display: flex; gap: 6px; flex-wrap: wrap; }
.lib-studio .scrub .speeds button {
  font-size: 10.5px; font-weight: 800;
  padding: 4px 8px; border-radius: 8px;
  background: rgba(255,255,255,0.1); color: #fff;
  letter-spacing: 0.04em;
}
.lib-studio .scrub .speeds button.on { background: var(--sage-400); }
.lib-studio .scrub .speeds button.muted-tag { margin-left: auto; }

.lib-detail-meta { padding: 14px 0 0; }
.lib-detail-meta .sub { color: var(--muted); font-size: 11px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; }
.lib-detail-meta h2 { margin: 4px 0 8px; font-size: 22px; font-weight: 800; letter-spacing: -0.02em; }
.lib-detail-meta p { margin: 0; color: var(--ink-2); font-size: 14px; line-height: 1.5; }

.lib-errors { margin-top: 18px; }
.lib-errors h3 { margin: 0 0 8px; font-size: 13px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: var(--coral-500); }
.lib-errors .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.lib-errors .e {
  aspect-ratio: 4/3; border-radius: var(--r-sm);
  background: color-mix(in srgb, var(--coral-300) 18%, var(--surface));
  border: 1px solid color-mix(in srgb, var(--coral-300) 30%, transparent);
  display: grid; place-items: center;
  color: var(--coral-500);
  font-size: 11.5px; font-weight: 700;
  text-align: center; padding: 4px;
}

.lib-pattern-pick { margin-top: 18px; }
.lib-pattern-pick .label { font-size: 13px; font-weight: 700; margin-bottom: 8px; display: block; }

/* PROFILE */
.profile-head {
  display: flex; align-items: center; gap: 14px;
  padding: 16px;
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--r-lg); margin-top: 4px;
  box-shadow: var(--shadow-1);
}
.avatar {
  width: 64px; height: 64px;
  border-radius: var(--r-pill);
  background: var(--grad-primary);
  display: grid; place-items: center;
  color: #fff;
  font-weight: 800; font-size: 22px;
  letter-spacing: -0.02em;
}
.profile-head .info b { display: block; font-size: 18px; font-weight: 800; letter-spacing: -0.015em; }
.profile-head .info span { display: block; color: var(--muted); font-size: 13px; margin-top: 2px; }

.settings-list {
  margin-top: 14px;
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--r-lg);
  box-shadow: var(--shadow-1);
  overflow: hidden;
}
.settings-list .row {
  display: grid; grid-template-columns: 36px 1fr auto;
  gap: 12px; align-items: center;
  padding: 12px 16px;
  border-top: 1px solid var(--line);
  cursor: pointer;
  min-height: 56px;
}
.settings-list .row:first-child { border-top: 0; }
.settings-list .row .ic {
  width: 36px; height: 36px; border-radius: var(--r-sm);
  background: color-mix(in srgb, var(--sage-300) 18%, transparent);
  display: grid; place-items: center;
  color: var(--primary);
}
.settings-list .row .ic svg { width: 18px; height: 18px; }
.settings-list .row .lbl b { display: block; font-size: 14px; font-weight: 700; }
.settings-list .row .lbl span { display: block; color: var(--muted); font-size: 12px; margin-top: 1px; }
.settings-list .row .end-mark { color: var(--muted); }
.settings-list .row .end-mark svg { width: 18px; height: 18px; }

.subview-head {
  display: flex; justify-content: space-between; align-items: center;
  padding-top: env(safe-area-inset-top);
  margin-bottom: 8px; min-height: 44px;
}
.subview-head .back {
  display: inline-flex; align-items: center; gap: 6px;
  color: var(--primary); font-weight: 700; font-size: 14px;
  min-height: 44px; padding: 0 4px;
}
.subview-head .back svg { width: 16px; height: 16px; }
.subview-head h2 { margin: 0; font-size: 17px; font-weight: 700; letter-spacing: -0.01em; }

.scope-label {
  color: var(--muted); font-size: 11px; font-weight: 800;
  letter-spacing: 0.16em; text-transform: uppercase;
  padding: 18px 4px 8px;
}

.toggle-list {
  background: var(--surface); border: 1px solid var(--line);
  border-radius: var(--r-lg); overflow: hidden;
  box-shadow: var(--shadow-1);
}
.toggle-list .row {
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; padding: 12px 16px;
  border-top: 1px solid var(--line);
  min-height: 56px;
}
.toggle-list .row:first-child { border-top: 0; }
.toggle-list .row .lbl b { display: block; font-size: 14px; font-weight: 700; }
.toggle-list .row .lbl span { display: block; color: var(--muted); font-size: 12px; margin-top: 1px; line-height: 1.3; }

.switch {
  width: 44px; height: 26px;
  border-radius: 13px;
  background: var(--line-2);
  position: relative;
  cursor: pointer; flex-shrink: 0;
  transition: background var(--d-short) var(--ease);
}
.switch::after {
  content: "";
  position: absolute; top: 2px; left: 2px;
  width: 22px; height: 22px;
  border-radius: 50%;
  background: #fff;
  box-shadow: 0 2px 5px rgba(0,0,0,0.25);
  transition: left var(--d-short) var(--ease);
}
.switch[aria-pressed="true"] { background: var(--sage-500); }
.switch[aria-pressed="true"]::after { left: 20px; }

.pat-radio {
  display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 4px;
}
.pat-opt {
  position: relative;
  padding: 14px 10px;
  border-radius: var(--r-md);
  background: var(--surface); border: 1px solid var(--line);
  text-align: center; cursor: pointer;
  box-shadow: var(--shadow-1);
}
.pat-opt[aria-pressed="true"] {
  border-color: var(--sage-400);
  background: color-mix(in srgb, var(--sage-300) 10%, var(--surface));
  box-shadow: 0 0 0 2px color-mix(in srgb, var(--sage-300) 30%, transparent);
}
.pat-opt[aria-pressed="true"]::after {
  content: "✓";
  position: absolute; top: 6px; right: 8px;
  color: var(--primary); font-weight: 800;
}
.pat-opt .ix {
  width: 36px; height: 36px;
  margin: 0 auto 6px;
  border-radius: var(--r-sm);
  background: var(--grad-primary);
  display: grid; place-items: center;
  color: #fff;
}
.pat-opt .ix svg { width: 16px; height: 16px; }
.pat-opt b { display: block; font-size: 12px; font-weight: 800; }
.pat-opt span { display: block; color: var(--muted); font-size: 10.5px; margin-top: 2px; }

.audio-row {
  display: inline-flex; gap: 4px;
  background: var(--surface-3); padding: 3px;
  border-radius: var(--r-sm); border: 1px solid var(--line);
}
.audio-row button {
  font-size: 11px; font-weight: 700;
  padding: 6px 10px; border-radius: 8px;
  color: var(--muted);
}
.audio-row button[aria-pressed="true"] { background: var(--surface); color: var(--primary); box-shadow: var(--shadow-1); }

.programma-card {
  margin-top: 12px; padding: 16px;
  border-radius: var(--r-lg);
  background:
    radial-gradient(400px 200px at 100% 0%, color-mix(in srgb, var(--coral-300) 14%, transparent), transparent 60%),
    var(--surface);
  border: 1px solid var(--line);
  box-shadow: var(--shadow-1);
}
.programma-card h3 { margin: 0; font-size: 17px; font-weight: 800; letter-spacing: -0.01em; }
.programma-card p { margin: 6px 0 12px; color: var(--muted); font-size: 13px; }
.programma-card .days { display: flex; gap: 6px; flex-wrap: wrap; }
.programma-card .day {
  padding: 6px 10px; border-radius: var(--r-pill);
  background: var(--surface-2); border: 1px solid var(--line);
  font-size: 11px; font-weight: 700;
  color: var(--ink);
}
.programma-card .day.on { background: var(--grad-primary); color: #fff; border-color: transparent; }

.guide-card {
  margin-top: 12px; padding: 16px;
  background: var(--surface); border: 1px solid var(--line); border-radius: var(--r-lg);
  box-shadow: var(--shadow-1);
}

.onboarding {

function loadStore() {
  try {
    const raw = localStorage.getItem(KEY);
    if (raw) {
      const s = JSON.parse(raw);
      s.settings = Object.assign({}, DEFAULT_SETTINGS, s.settings || {});
      return s;
    }
  } catch (e) {}
  let mutedExercises = [];
  try { mutedExercises = JSON.parse(localStorage.getItem(KEY_LEGACY_MUTE) || "[]"); } catch (e) {}
  return {
    settings: Object.assign({}, DEFAULT_SETTINGS),
    sessions: [],
    mutedExercises,
    patternOverrides: {}
  };
}

function saveStore(s) { try { localStorage.setItem(KEY, JSON.stringify(s)); } catch (e) {} }

function isVideo(src) { return /\.(mov|mp4|webm)$/i.test(src || ""); }
function exerciseId(c, l, n) { return c + ":" + l + ":" + n; }
function exerciseAudioKey(ex) { return exerciseId(state.category, state.level, ex.name); }
function isExerciseMuted(ex) { return store.mutedExercises.includes(exerciseAudioKey(ex)); }
function setExerciseMuted(ex, muted) {
  const k = exerciseAudioKey(ex);
  store.mutedExercises = muted
    ? Array.from(new Set([...store.mutedExercises, k]))
    : store.mutedExercises.filter(x => x !== k);
  saveStore(store);
  try { localStorage.setItem(KEY_LEGACY_MUTE, JSON.stringify(store.mutedExercises)); } catch (e) {}
}
function getPatternOverride(ex) {
  const k = exerciseId(state.category, state.level, ex.name);
  return store.patternOverrides[k] || null;
}
function setPatternOverride(ex, value) {
  const k = exerciseId(state.category, state.level, ex.name);
  if (value === null || value === "default") delete store.patternOverrides[k];
  else store.patternOverrides[k] = value;
  saveStore(store);
}
function effectivePattern(ex) {
  const override = ex ? getPatternOverride(ex) : null;
  return override || store.settings.pattern;
}
function currentWorkout() { return WORKOUTS[state.category][state.level]; }
function currentExercise() { return currentWorkout().exercises[state.exerciseIndex]; }
function nextExerciseInQueue() {
  const w = currentWorkout();
  if (state.exerciseIndex < w.exercises.length - 1) return w.exercises[state.exerciseIndex + 1];
  if (state.roundIndex < w.rounds - 1) return w.exercises[0];
  return null;
}
function durationMinutes(w) {
  const work = w.work * w.exercises.length * w.rounds;
  const rests = w.rest * ((w.exercises.length * w.rounds) - 1);
  return Math.ceil((work + rests) / 60);
}

const HAPTIC = {
  off:      { tap:0, tick:0, phase:0, end:0 },
  light:    { tap:[6], tick:[8], phase:[20], end:[30,20,30] },
  standard: { tap:[10], tick:[14], phase:[40,30,40], end:[80,40,80] },

function vibrate(kind) {

/* VOICE COACH */
function speak(text) {
  if (!store.settings.voiceCoach) return;
  if (!("speechSynthesis" in window)) return;
  try {
    const u = new SpeechSynthesisUtterance(text);
    u.lang = "it-IT"; u.rate = 1.05; u.volume = 0.9;
    speechSynthesis.cancel(); speechSynthesis.speak(u);
  } catch (e) {}
}
function beep(frequency, duration) {
  try {
    if (!state.audioCtx) state.audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const ctx = state.audioCtx;
    if (ctx.state === "suspended") ctx.resume();
    const o = ctx.createOscillator(), g = ctx.createGain();
    o.type = "sine"; o.frequency.value = frequency || 880;
    g.gain.value = 0.0001;
    o.connect(g); g.connect(ctx.destination);
    const now = ctx.currentTime;
    g.gain.exponentialRampToValueAtTime(0.18, now + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, now + (duration || 0.12));
    o.start(now); o.stop(now + (duration || 0.12) + 0.02);
  } catch (e) {}
}

function computeStreak(sessions) {
  if (!sessions.length) return 0;
  const dayKey = (ts) => new Date(ts).toISOString().slice(0,10);
  const days = new Set(sessions.map(s => dayKey(s.timestamp)));
  let streak = 0;
  const today = new Date();
  for (let i = 0; i < 90; i++) {
    const d = new Date(today); d.setDate(d.getDate() - i);
    const k = d.toISOString().slice(0,10);
    if (days.has(k)) streak += 1;
    else if (i === 0) continue;
    else break;
  }
  return streak;
}
function sessionsThisWeek(sessions) {
  const now = new Date();
  const monday = new Date(now); monday.setDate(now.getDate() - ((now.getDay()+6)%7)); monday.setHours(0,0,0,0);
  return sessions.filter(s => s.timestamp >= monday.getTime()).length;
}
function totalMinutesAllTime(sessions) {
  return sessions.reduce((acc, s) => acc + (s.duration || 0), 0);
}
function relativeTime(ts) {
  const diff = Date.now() - ts;
  const m = Math.floor(diff / 60000), h = Math.floor(diff/3600000), d = Math.floor(diff/86400000);
  if (m < 1) return "ora";
  if (m < 60) return m + " min fa";
  if (h < 24) return h + "h fa";
  if (d === 1) return "ieri";
  return d + " g fa";
}

/* CACHE MANAGEMENT — solo per questa origin */
async function estimateCacheSize() {
  try {
    if ("storage" in navigator && "estimate" in navigator.storage) {
      const e = await navigator.storage.estimate();
      const usage = e.usage || 0;
      let entries = 0;
      if ("caches" in window) {
        const keys = await caches.keys();
        for (const k of keys) {
          const c = await caches.open(k);
          const reqs = await c.keys();
          entries += reqs.length;
        }
      }
      const mb = (usage / 1024 / 1024).toFixed(1);
      return entries > 0
        ? `${mb} MB · ${entries} file in cache`
        : `${mb} MB usati · cache vuota`;
    }
    return "Stima non disponibile";
  } catch (e) {
    return "Stima non disponibile";
  }
}

async function clearAppCache() {
  // 1. svuota tutti i Cache Storage di questa origin
  try {
    if ("caches" in window) {
      const keys = await caches.keys();
      await Promise.all(keys.map(k => caches.delete(k)));
    }
  } catch (e) {}
  // 2. unregister di tutti i service worker di questa origin
  try {
    if ("serviceWorker" in navigator) {
      const regs = await navigator.serviceWorker.getRegistrations();
      await Promise.all(regs.map(r => r.unregister()));
    }
  } catch (e) {}
  // 3. (opzionale) sessionStorage di questa origin
  try { sessionStorage.clear(); } catch (e) {}
}

/* mini markdown → HTML (subset usato dal documento purpose) */
function mdToHtml(md) {
  // strip [cite:N] references (used in the source document)
  md = md.replace(/\[cite:\d+\]/g, "");
  // images first (before links)
  md = md.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1" loading="lazy">');
  // links
  md = md.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');
  // bold + italic
  md = md.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  md = md.replace(/(^|[^*])\*([^*\n]+)\*/g, '$1<em>$2</em>');
  // split into blocks by blank lines
  const blocks = md.split(/\n{2,}/);
  return blocks.map(b => {
    b = b.trim();
    if (!b) return "";
    if (/^#\s+/.test(b)) return b.replace(/^#\s+(.*)/, '<h2 class="md-h1">$1</h2>');
    if (/^##\s+/.test(b)) return b.replace(/^##\s+(.*)/, '<h3 class="md-h2">$1</h3>');
    if (/^###\s+/.test(b)) return b.replace(/^###\s+(.*)/, '<h4 class="md-h3">$1</h4>');
    if (/^[-*]\s+/m.test(b)) {
      const items = b.split(/\n/).filter(l => /^[-*]\s+/.test(l)).map(l => '<li>' + l.replace(/^[-*]\s+/, '') + '</li>').join('');
      return '<ul class="md-ul">' + items + '</ul>';
    }
    return '<p class="md-p">' + b.replace(/\n/g, '<br>') + '</p>';
  }).join('\n');
}

      <a class="icon-btn" id="guideOpenSrc" href="workout-purpose-v1.md" target="_blank" rel="noopener" aria-label="Apri documento sorgente">${ICONS.share}</a>
    </div>

    <div class="guide-card" id="guidePurposeWrap">
      <div class="purpose-eyebrow">Programma · documento di base</div>
      <div id="guidePurpose" class="md-content"><p class="md-p" style="color:var(--muted)">Caricamento documento…</p></div>
      <div style="margin-top:14px;display:flex;gap:8px;flex-wrap:wrap">
        <a class="chip sage" href="workout-purpose-v1.md" target="_blank" rel="noopener">Apri sorgente .md</a>
        <span class="chip">3 preset · Vita · Gambe · Glutei</span>
      </div>
    </div>

    <div class="section-title" style="margin-top:22px"><h2>I 3 preset in app</h2></div>
    ${Object.entries(CATEGORIES).map(([k,c]) => `
      <div class="guide-card">
        <h3>${c.tab} · ${c.title}</h3>
        <p>${c.description}</p>
        <ul>
          <li>Easy: ${WORKOUTS[k].easy.exercises.map(e => e.name).join(", ")}.</li>
          <li>Advanced: ${WORKOUTS[k].advanced.exercises.map(e => e.name).join(", ")}.</li>
        </ul>
      </div>
    `).join("")}
    <div class="guide-card" style="background:linear-gradient(180deg, color-mix(in srgb, var(--sage-300) 12%, transparent), var(--surface));border-color: color-mix(in srgb, var(--sage-300) 30%, transparent)">
      <h3>Priorità pratica</h3>
      <p>Gambe quasi sempre · Glutei spesso · Vita 3-4 volte a settimana. Movimenti lenti, controllati, senza dolore.</p>
    </div>
  `;
  $("#view-guide .back").addEventListener("click", () => go("profile"));
  // load and render the purpose markdown
  loadPurposeMd().then(md => {
    const host = $("#guidePurpose");
    if (!host) return;
    if (!md) {
      host.innerHTML = '<p class="md-p" style="color:var(--muted)">Documento non disponibile offline. Apri <code>workout-purpose-v1.md</code> dalla cartella dell\'app.</p>';
      return;
    }
    host.innerHTML = mdToHtml(md);
  });
}

function renderCurrentView() {
  switch (state.view) {
    case "today": renderToday(); break;
    case "train": renderTrain(); break;
    case "library": renderLibrary(); break;
    case "library-detail": renderLibraryDetail(); break;
    case "profile": renderProfile(); break;
    case "settings-player": renderSettingsPlayer(); break;
    case "settings-app": renderSettingsApp(); break;
    case "programma": renderProgramma(); break;
    case "guide": renderGuide(); break;
  }
}

/* ============== NOW TRAINING ============== */
const nowEl = $("#view-now");
const endEl = $("#view-end");
let nowOpen = false;
let lastRenderedMediaKey = "", lastRenderedPipKey = "", lastRenderedRestKey = "";
let lastTickFor321 = -1;
let pressTimer = null;

function openNow() {
  if (state.status === "idle" || state.status === "done") {
    state.phase = "work";
    state.remaining = currentWorkout().work;
    state.phaseTotal = currentWorkout().work;
  }
  nowOpen = true;
  nowEl.classList.add("is-active");
  $("#tabbar").classList.add("hidden");
  applyPattern();
  renderNow();
}

function closeNow() {
  nowOpen = false;
  pauseEngine();
  releaseWakeLock();
  nowEl.classList.remove("is-active");
  if (["today","train","library","profile"].includes(state.view)) {
    $("#tabbar").classList.remove("hidden");
  }
  renderCurrentView();
}

function applyPattern() {
  const ex = currentExercise();
  nowEl.dataset.pattern = effectivePattern(ex);
  nowEl.dataset.phase = state.phase;
  nowEl.dataset.nextPreview = store.settings.nextPreview ? "on" : "off";
}

function renderNow() {
  if (!nowOpen) return;
  const w = currentWorkout();
  const ex = currentExercise();
  applyPattern();

  $("#nowCrumb").textContent = CATEGORIES[state.category].tab + " · " + (state.level === "easy" ? "Easy" : "Advanced");

  const t = state.remaining;
  const fullDash = 540;
  const offset = state.phaseTotal ? fullDash - (fullDash * (state.phaseTotal - state.remaining) / state.phaseTotal) : fullDash;
  $("#nowRingFill").setAttribute("stroke-dashoffset", String(Math.max(0, Math.min(fullDash, offset))));
  const timeText = fmtTime(t);
  $("#nowTimer").textContent = timeText;
  $("#nowMinTimer").textContent = timeText;
  $("#nowMinLab").textContent = state.phase === "rest" ? "Recupero" : "Esercizio";
  $("#coachT").textContent = timeText;

  $("#nowPhaseLab").textContent = (state.phase === "rest" ? "recupero · giro " : "esercizio · giro ") + (state.roundIndex+1) + "/" + w.rounds;

  const next = nextExerciseInQueue();
  const nameText = state.phase === "rest" ? "Recupero" : ex.name;
  const cueText = state.phase === "rest" ? ("Prossimo: " + (next ? next.name : "fine workout") + ". Respira, sciogli spalle.") : ex.cue;
  $("#nowName").textContent = nameText;
  $("#nowCue").textContent = cueText;
  $("#nowFlName").textContent = nameText;
  $("#nowFlCue").textContent = cueText;
  $("#nowMinName").textContent = nameText;
  $("#nowMinCue").textContent = cueText;
  $("#coachName").textContent = nameText;
  $("#coachNext").textContent = next ? "→ " + next.name : "ultimo esercizio";

  $("#nowPpIcon").innerHTML = state.status === "running" ? ICONS.pause : ICONS.play;
  $("#nowPpText").textContent = state.status === "running" ? "Pausa" : state.status === "paused" ? "Riprendi" : state.status === "done" ? "Rifai" : "Inizia";

  const prog = state.phaseTotal ? ((state.phaseTotal - state.remaining) / state.phaseTotal) * 100 : 100;
  $("#nowProgress").querySelector("i").style.width = Math.max(0, Math.min(100, prog)) + "%";

  renderNowStage(ex);
  renderPip(ex);
  renderNextOrRest(w, ex, next);

  if (state.status === "running" && state.phase === "work" && t <= 3 && t > 0 && t !== lastTickFor321) {
    lastTickFor321 = t;
    vibrate("tick");
    if (store.settings.voiceCoach) speak(String(t));
    else beep(880, 0.1);
  }
}

function renderNowStage(ex) {
  const stage = $("#nowStage");
  const minVideo = $("#nowMinVideo");
  const pat = nowEl.dataset.pattern;
  const useVideoOnStage = (pat === "cinematic" || pat === "coach");
  const useVideoOnMin = (pat === "minimal");
  const reduceData = store.settings.reduceData;
  const src = ex.images && ex.images[0];
  const isVid = src && isVideo(src) && !reduceData;

  const key = state.phase + "|" + ex.name + "|" + pat + "|" + reduceData + "|" + state.status;
  if (key !== lastRenderedMediaKey) {
    lastRenderedMediaKey = key;
    Array.from(stage.querySelectorAll("video, img.pic")).forEach(n => n.remove());
    minVideo.innerHTML = "";
    if (useVideoOnStage) {
      const node = makeMediaNode(ex, isVid, "pic");
      stage.insertBefore(node, stage.firstChild);
    }
    if (useVideoOnMin) minVideo.appendChild(makeMediaNode(ex, isVid));
  }
  const dim = stage.querySelector(".dim");
  if (dim) stage.appendChild(dim);
  syncVideoAudio(stage.querySelector("video"));
  syncVideoAudio(minVideo.querySelector("video"));
}

function makeMediaNode(ex, isVid, classExtra) {
  if (isVid) {
    const v = document.createElement("video");
    v.src = ex.images[0];
    if (ex.poster) v.poster = ex.poster;
    v.muted = true;
    v.loop = !!store.settings.autoplayLoop;
    v.playsInline = true;
    v.setAttribute("playsinline", "");
    v.setAttribute("webkit-playsinline", "");
    v.preload = "metadata";
    v.autoplay = true;
    if (classExtra) v.classList.add(classExtra);
    setTimeout(() => v.play().catch(() => {}), 50);
    return v;
  }
  const img = document.createElement("img");
  img.src = ex.poster || (ex.images && ex.images[0]) || "icon.svg";
  img.alt = ex.name;
  if (classExtra) img.classList.add(classExtra);
  return img;
}

function syncVideoAudio(v) {
  if (!v) return;
  const mode = store.settings.videoAudio;
  const exMute = isExerciseMuted(currentExercise());
  if (exMute || mode === "off") { v.muted = true; v.volume = 0; }
  else if (mode === "mix") { v.muted = false; v.volume = 0.6; }
  else if (mode === "only") { v.muted = false; v.volume = 1; }
}

function renderPip(ex) {
  const pat = nowEl.dataset.pattern;
  const pip = $("#pipFloater");
  if (pat !== "floating") {
    pip.hidden = true;
    pip.querySelectorAll("video,img").forEach(n => n.remove());
    lastRenderedPipKey = "";
    return;
  }
  pip.hidden = false;
  const reduceData = store.settings.reduceData;
  const src = ex.images && ex.images[0];
  const isVid = src && isVideo(src) && !reduceData;
  const key = ex.name + "|" + reduceData + "|" + state.phase;
  if (key !== lastRenderedPipKey) {
    lastRenderedPipKey = key;
    pip.querySelectorAll("video,img").forEach(n => n.remove());
    pip.appendChild(makeMediaNode(ex, isVid));
  }
  if (state.pipPos.x !== null) {
    pip.style.right = "auto"; pip.style.bottom = "auto";
    pip.style.left = state.pipPos.x + "px";
    pip.style.top = state.pipPos.y + "px";
  }
}

function renderNextOrRest(w, ex, next) {
  const strip = $("#nowNextStrip");
  const restPrev = $("#restPreview");
  const pat = nowEl.dataset.pattern;
  const showStrip = (pat === "cinematic") && state.phase === "work";
  const showRestPrev = (state.phase === "rest") && store.settings.nextPreview && next && pat === "cinematic";
  strip.style.display = showStrip ? "" : "none";
  restPrev.style.display = showRestPrev ? "" : "none";

  if (showStrip) {
    const wnext = w.exercises.slice(state.exerciseIndex + 1, state.exerciseIndex + 4);
    const filled = wnext.length ? wnext : (state.roundIndex < w.rounds - 1 ? w.exercises.slice(0, 3) : []);
    $("#nowNextRow").innerHTML = filled.map(e => `
      <div class="next-mini">
        <div class="pic">${e.poster ? '<img src="'+e.poster+'" alt="">' : (e.images && e.images[0] && !isVideo(e.images[0])) ? '<img src="'+e.images[0]+'" alt="">' : ""}</div>
        <b>${e.name.split(" ").slice(0,2).join(" ")}</b>
        <span>${w.work}s</span>
      </div>
    `).join("");
  }

  if (showRestPrev) {
    const card = $("#restPreviewCard");
    const key = next.name + "|" + state.phase;
    if (key !== lastRenderedRestKey) {
      lastRenderedRestKey = key;
      card.innerHTML = "";
      const reduceData = store.settings.reduceData;
      const src = next.images && next.images[0];
      const isVid = src && isVideo(src) && !reduceData;
      card.appendChild(makeMediaNode(next, isVid));
      restPrev.setAttribute("data-name", next.name);
      card.setAttribute("data-name", next.name);
    }
  } else {
    lastRenderedRestKey = "";
  }
}

function tick() {
  if (state.remaining > 1) state.remaining -= 1;
  else advancePhase();
  renderNow();
}

function advancePhase() {
  const w = currentWorkout();
  const lastEx = state.exerciseIndex === w.exercises.length - 1;
  const lastRound = state.roundIndex === w.rounds - 1;
  if (state.phase === "work" && !(lastEx && lastRound)) {
    state.phase = "rest";
    state.remaining = w.rest;
    state.phaseTotal = w.rest;
    vibrate("phase");
    if (store.settings.voiceCoach) speak("Recupero");
    return;
  }
  if (lastEx) {
    if (lastRound) { completeWorkout(); return; }
    state.roundIndex += 1;
    state.exerciseIndex = 0;
  } else {
    state.exerciseIndex += 1;
  }
  state.phase = "work";
  state.remaining = w.work;
  state.phaseTotal = w.work;
  vibrate("phase");
  if (store.settings.voiceCoach) speak(currentExercise().name);
}

function completeWorkout() {
  pauseEngine();
  state.status = "done";
  releaseWakeLock();
  vibrate("end");
  const w = currentWorkout();
  const sess = {
    timestamp: Date.now(),
    category: state.category,
    level: state.level,
    duration: durationMinutes(w),
    rounds: w.rounds,
    exercises: w.exercises.length
  };
  store.sessions = [sess].concat(store.sessions || []).slice(0, 200);
  saveStore(store);
  showEnd(sess);
}

function showEnd(sess) {
  const c = CATEGORIES[sess.category];
  $("#endSummary").textContent = c.tab + " · " + (sess.level === "easy" ? "Easy" : "Advanced") + " · " + sess.duration + "' · " + sess.rounds + " giri";
  $("#endStreak").textContent = computeStreak(store.sessions);
  $("#endCal").textContent = Math.round(sess.duration * 6.5);
  $("#endEx").textContent = sess.exercises;
  endEl.classList.add("is-active");
  if (store.settings.voiceCoach) speak("Allenamento completato. Ottimo lavoro!");
}

function startEngine() {
  if (state.status === "done") resetTimer();
  if (state.intervalId) clearInterval(state.intervalId);
  state.status = "running";
  requestWakeLock();
  state.intervalId = setInterval(tick, 1000);
}
function pauseEngine() {
  if (state.intervalId) { clearInterval(state.intervalId); state.intervalId = null; }
  if (state.status === "running") state.status = "paused";
  releaseWakeLock();
}
function stopEngine() { pauseEngine(); resetTimer(); }
function resetTimer() {
  const w = currentWorkout();
  state.phase = "work"; state.roundIndex = 0; state.exerciseIndex = 0;
  state.remaining = w.work; state.phaseTotal = w.work; state.status = "idle";
}
function nextStep() { if (state.status === "done") return; advancePhase(); renderNow(); }
function prevStep() {
  if (state.exerciseIndex > 0) state.exerciseIndex -= 1;
  else if (state.roundIndex > 0) {
    state.roundIndex -= 1;
    state.exerciseIndex = currentWorkout().exercises.length - 1;
  }
  state.phase = "work";
  state.remaining = currentWorkout().work;
  state.phaseTotal = currentWorkout().work;
  renderNow();
}

$("#nowExit").addEventListener("click", () => {
  if (state.status === "running" || state.status === "paused") {
    showSheet(`
      <h3>Interrompere il workout?</h3>
      <p>Il timer si fermerà e non verrà salvato nel diario.</p>
      <div class="actions">
        <button class="btn coral full" id="qYes">Esci</button>
        <button class="btn ghost full" id="qNo">Continua</button>
      </div>`);
    $("#qYes").addEventListener("click", () => { hideSheet(); stopEngine(); closeNow(); go("today"); });
    $("#qNo").addEventListener("click", hideSheet);
  } else { closeNow(); go("today"); }
});

$("#nowPlayPause").addEventListener("click", () => {
  if (state.status === "running") pauseEngine();
  else startEngine();
  renderNow();
  vibrate("tap");
});
$("#nowNext").addEventListener("click", () => { vibrate("tap"); nextStep(); });
$("#nowPrev").addEventListener("click", () => { vibrate("tap"); prevStep(); });

$("#nowMenu").addEventListener("click", () => {
  const cur = store.settings.pattern;
  showSheet(`
    <h3>Stile player</h3>
    <p>Cambio al volo. Per impostarlo come default vai in Profilo → Player.</p>
    <div class="pat-radio">
      <div class="pat-opt" data-p="cinematic" aria-pressed="${cur==='cinematic'}">
        <div class="ix">${ICONS.videoIcon}</div><b>Cinematico</b><span>A</span>
      </div>
      <div class="pat-opt" data-p="floating" aria-pressed="${cur==='floating'}">
        <div class="ix">${ICONS.pip}</div><b>Floating</b><span>B</span>
      </div>
      <div class="pat-opt" data-p="minimal" aria-pressed="${cur==='minimal'}">
        <div class="ix">${ICONS.minimal}</div><b>Minimale</b><span>—</span>
      </div>
    </div>
    <div class="actions" style="margin-top:14px">
      <button class="btn ghost full" id="patClose">Chiudi</button>
    </div>`);
  $$('.sheet .pat-opt').forEach(o => o.addEventListener("click", () => {
    store.settings.pattern = o.dataset.p; saveStore(store);
    hideSheet(); applyPattern(); renderNow(); toast("Stile: " + o.querySelector("b").textContent); vibrate("tap");
  }));
  $("#patClose").addEventListener("click", hideSheet);
});

const stage = $("#nowStage");
function pressStart() {
  if (!store.settings.coachOnLongPress) return;
  pressTimer = setTimeout(() => {
    nowEl.dataset.pattern = "coach";
    toast("Coach Mode · swipe ↓ per uscire");
    vibrate("phase");
  }, 600);
}
function pressEnd() { if (pressTimer) { clearTimeout(pressTimer); pressTimer = null; } }
stage.addEventListener("touchstart", pressStart, { passive: true });
stage.addEventListener("touchend", pressEnd);
stage.addEventListener("touchcancel", pressEnd);
stage.addEventListener("mousedown", pressStart);
stage.addEventListener("mouseup", pressEnd);
stage.addEventListener("mouseleave", pressEnd);

$("#coachExit").addEventListener("click", () => {
  nowEl.dataset.pattern = effectivePattern(currentExercise()) === "coach" ? "cinematic" : effectivePattern(currentExercise());
  if (nowEl.dataset.pattern === "coach") nowEl.dataset.pattern = "cinematic";
  applyPattern(); renderNow();
});

let touchStartY = 0;
nowEl.addEventListener("touchstart", (e) => { touchStartY = e.touches[0].clientY; }, { passive: true });
nowEl.addEventListener("touchend", (e) => {
  if (nowEl.dataset.pattern !== "coach") return;
  const dy = e.changedTouches[0].clientY - touchStartY;
  if (dy > 80) {
    nowEl.dataset.pattern = "cinematic";
    applyPattern(); renderNow(); vibrate("tap");
  }
});

const pip = $("#pipFloater");
let pipDrag = false, pipOff = { x: 0, y: 0 };
function pipDown(e) {
  pipDrag = true;
  const t = e.touches ? e.touches[0] : e;
  const r = pip.getBoundingClientRect();
  pipOff.x = t.clientX - r.left;
  pipOff.y = t.clientY - r.top;
}
function pipMove(e) {
  if (!pipDrag) return;
  const t = e.touches ? e.touches[0] : e;
  const x = t.clientX - pipOff.x;
  const y = t.clientY - pipOff.y;
  pip.style.right = "auto"; pip.style.bottom = "auto";
  pip.style.left = Math.max(8, Math.min(window.innerWidth - pip.offsetWidth - 8, x)) + "px";
  pip.style.top = Math.max(8, Math.min(window.innerHeight - pip.offsetHeight - 8, y)) + "px";
  state.pipPos.x = parseInt(pip.style.left); state.pipPos.y = parseInt(pip.style.top);
}
function pipUp() { pipDrag = false; }
pip.addEventListener("touchstart", pipDown, { passive: true });
pip.addEventListener("touchmove", pipMove, { passive: true });
pip.addEventListener("touchend", pipUp);
pip.addEventListener("mousedown", pipDown);
window.addEventListener("mousemove", pipMove);
window.addEventListener("mouseup", pipUp);
pip.addEventListener("dblclick", () => {
  store.settings.pattern = "cinematic"; saveStore(store);
  applyPattern(); renderNow(); toast("Stile: Cinematico");
});

$("#endHome").addEventListener("click", () => { endEl.classList.remove("is-active"); closeNow(); go("today"); });
$("#endSave").addEventListener("click", () => { endEl.classList.remove("is-active"); closeNow(); go("today"); toast("Salvato nel diario"); });
$("#endRetry").addEventListener("click", () => { endEl.classList.remove("is-active"); resetTimer(); openNow(); startEngine(); renderNow(); });
$("#endShare").addEventListener("click", async () => {
  const c = CATEGORIES[state.category];
  const data = { title: "Personal Workout", text: "Ho completato " + c.tab + " · " + state.level + " 💪", url: location.href };
  if (navigator.share) try { await navigator.share(data); } catch (e) {}
  else toast("Share non supportato");
});

document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible" && state.status === "running") requestWakeLock();
});

/* THEME */
function applyTheme() {
  const t = store.settings.theme;
  if (t === "auto") document.documentElement.removeAttribute("data-theme");
  else document.documentElement.setAttribute("data-theme", t);
}

/* TAB BAR */
$$(".tab").forEach(t => t.addEventListener("click", () => { go(t.dataset.tab); vibrate("tap"); }));

/* ONBOARDING */
const ONB_PAGES = [
  { icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 11a3 3 0 1 1 6 0c0 2-3 3-3 5"/><circle cx="12" cy="18" r="0.5" fill="currentColor"/></svg>',
    h: "Ciao Francesca", p: "Un piccolo programma a corpo libero pensato per affiancare la tua camminata quotidiana." },
  { icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>',
    h: "30/40 secondi · 4 esercizi", p: "Ogni serie dura 4-5 minuti. Lavoro breve, lento, controllato. Senza dolore alle ginocchia." },
  { icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><path d="m10 9 5 3-5 3z"/></svg>',
    h: "Video di forma", p: "Per ogni esercizio c'è un video. Cinematico, floating o coach mode: scegli tu come vederlo, anche per singolo esercizio." },
  { icon: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22a7 7 0 0 0 7-7c0-3-2-5-3-7-1 2-3 3-4 3 0-2-1-4-3-6-1 4-4 6-4 10a7 7 0 0 0 7 7z"/></svg>',
    h: "Streak motivazionale", p: "Ogni sessione contribuisce alla tua streak. Obiettivo: 4 giorni a settimana, gambe + glutei prima di tutto." }
];
let onbIdx = 0;
function showOnboarding() { onbIdx = 0; $("#onboarding").classList.add("is-active"); renderOnb(); }
function renderOnb() {
  $("#onbPages").innerHTML = ONB_PAGES.map((p,i) => `
    <div class="onb-page ${i === onbIdx ? "is-active" : ""}">
      <div class="onb-icon">${p.icon}</div>
      <h2>${p.h}</h2>
      <p>${p.p}</p>
    </div>
  `).join("");
  $("#onbDots").innerHTML = ONB_PAGES.map((_,i) => '<i class="' + (i === onbIdx ? "on" : "") + '"></i>').join("");
  $("#onbNext").innerHTML = onbIdx === ONB_PAGES.length - 1 ? "Inizia" : "Avanti";
}
function closeOnboarding() { $("#onboarding").classList.remove("is-active"); store.settings.onboardingDone = true; saveStore(store); }
$("#onbSkip").addEventListener("click", closeOnboarding);
$("#onbNext").addEventListener("click", () => {
  if (onbIdx === ONB_PAGES.length - 1) { closeOnboarding(); return; }
  onbIdx += 1; renderOnb(); vibrate("tap");
});

/* INIT */
function init() {
  $("#nowPpIcon").innerHTML = ICONS.play;
  applyTheme();
  state.view = readHashRoute();
  go(state.view);
  if (!store.settings.onboardingDone) showOnboarding();
  if ("serviceWorker" in navigator) {
    window.addEventListener("load", () => { navigator.serviceWorker.register("sw.js").catch(() => {}); });
  }
  window.addEventListener("hashchange", () => {
    const h = readHashRoute();
    if (h !== state.view) go(h);
  });
}
init();
</script>
